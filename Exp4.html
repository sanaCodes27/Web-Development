<html>
<head>
<title>
     sup and sub using list tag
</title>
</head>
<body>
<ul><h3 style="color: red;">Maths</h3></ul>
<ol>
	<li>a<sup>m</sup>.&nbsp;a<sup>n</sup>=&nbsp;a<sup>m+n</sup><br></li>
	<li>a<sup>2</sup><br></li>
	<li>a<sup>2</sup>+b<sup>2</sup>=c<sup>2</sup><br></li>
	<li>x<sup>2</sup><br></li>
	<li>(a+b)<sup>3</sup>=a<sup>3</sup>+b<sup>3</sup>+3ab(a+b)</li>
</ol>
<ul><h3 style="color: red;">Physics</h3></ul>
<ol>
	<li>E = mc <sup>2</sup><br></li>
	<li>m/s<sup>2</sup><br></li>
	<li>V = a<sup>3</sup><br></li>
	<li>S=ut+1/2at<sup>2</sup><br></li>
	<li>P=I<sub>2</sub>R<br></li>
</ol>
<ul><h3 style="color: red;">Chemistry</h3></ul>
<ol>
	<li>H<sub>2</sub> O <br></li>
	<li>H<sub>2</sub> O<sub>2</sub><br></li>
	<li>H<sub>2</sub>SO<sub>4</sub><br></li>
	<li>NH<sub>3</sub><br></li>
	<li>CaCO<sub>2</sub><br></li>
</ol>
		
</body>
</html>
