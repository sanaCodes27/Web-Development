<!DOCTYPEhtml>
<html>
<head>
<title>
     sup and sub using table tag
</title>
</head>
<body>
<center>
<table border="5">
<tr>
   <th style="color: red;">Sr.NO.</th>
<th style="color: red;">Maths</th>
<th style="color: red;">Physics</th>
<th style="color: red;">Chemistry</th>
</tr>
	<tr>
		<td>1.</td>
		<td>a<sup>m</sup>.&nbsp;a<sup>n&nbsp;</sup>=&nbsp;a<sup>m+n</sup></td>
		<td>E &nbsp;=&nbsp; mc <sup>2</sup></td>
		<td>H<sub>2</sub> O </td>
	</tr>
	<tr>
		<td>2.</td>
		<td>a<sup>2</sup></td>
		<td>m/s<sup>2</sup></td>
		<td>m/s<sup>2</sup></td>
	</tr>
	<tr>
		<td>3.</td>
		<td>a<sup>2</sup>+b<sup>2</sup>&nbsp;=&nbsp;c<sup>2</sup><br></td>
		<td>V&nbsp; =&nbsp; a<sup>3</sup><br></td>
		<td>H<sub>2</sub>SO<sub>4</sub><br> </td>
	</tr>
	<tr>
		<td>4.</td>
		<td>x<sup>2</sup><br></td>
		<td>S&nbsp;=&nbsp;ut+1/2at<sup>2</sup><br></td>
		<td>NH<sub>3</sub><br> </td>
	</tr>
	<tr>
		<td>5.</td>
		<td>(a+b)<sup>3</sup>&nbsp;=&nbsp;a<sup>3</sup>+b<sup>3</sup>+3ab(a+b)</td>
		<td>P&nbsp;=&nbsp;I<sub>2</sub>R<br></td>
		<td>CaCO<sub>2</sub><br> </td>
	</tr>

</table>
		
</body>
</html>
